version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: retail_simulator_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: retail_simulator
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retail_simulator_backend
    environment:
      DATABASE_URL: mysql+pymysql://root:password@mysql:3306/retail_simulator
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: retail_simulator_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  mysql_data:
