[pytest]
# Pytest configuration for Retail Failure Simulator

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    property: Property-based tests using Hypothesis
    unit: Unit tests for specific scenarios
    integration: Integration tests across components
    slow: Tests that take significant time to run
    seasonal_risk: Tests for seasonal risk detection
    failure_simulation: Tests for failure simulation
    impact_analysis: Tests for impact analysis
    ai_reasoning: Tests for AI reasoning engine
    mitigation: Tests for mitigation engine
    dashboard: Tests for dashboard functionality
    data_processing: Tests for data processing

# Coverage options (when using pytest-cov)
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */alembic/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Hypothesis settings
[hypothesis]
# Profile is set via HYPOTHESIS_PROFILE environment variable
# or in conftest.py
